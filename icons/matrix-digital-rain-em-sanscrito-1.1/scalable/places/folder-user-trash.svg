            <feGaussianBlur stdDeviation="1.2" result="blur2"/>
            <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="neonOrange" x="-50%" y="-50%" width="200%" height="200%">
