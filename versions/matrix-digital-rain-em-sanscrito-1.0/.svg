<svg height="128px" viewBox="0 0 128 128" width="128px" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="a" gradientTransform="matrix(0.45451 0 0 0.455522 -1210.292114 616.172607)" gradientUnits="userSpaceOnUse" x1="2689.251953" x2="2918.069824" y1="-1106.802979" y2="-1106.802979">
            <stop offset="0" stop-color="#62a0ea"/>
            <stop offset="0.0576991" stop-color="#afd4ff"/>
            <stop offset="0.122204" stop-color="#62a0ea"/>
            <stop offset="0.873306" stop-color="#62a0ea"/>
            <stop offset="0.955997" stop-color="#c0d5ea"/>
            <stop offset="1" stop-color="#62a0ea"/>
        </linearGradient>
        
        <!-- Filtro de brilho/glow para os caracteres sânscritos -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- Padrão de caracteres caindo -->
        <pattern id="matrixRain" x="0" y="0" width="128" height="128" patternUnits="userSpaceOnUse">
            <!-- Linhas de caracteres sânscritos em diferentes posições e opacidades -->
            <g font-family="'Noto Sans Devanagari', 'Arial', sans-serif" font-size="9" fill="#2a8e4a" filter="url(#glow)">
                <!-- Coluna 1 -->
                <text x="6" y="14" opacity="0.9">ॐ</text>
                <text x="6" y="26" opacity="0.7">श्</text>
                <text x="6" y="38" opacity="0.5">री</text>
                <text x="6" y="50" opacity="0.8">ं</text>
                <text x="6" y="62" opacity="0.4">म</text>
                <text x="6" y="74" opacity="0.6">हा</text>
                <text x="6" y="86" opacity="0.3">ला</text>
                <text x="6" y="98" opacity="0.7">क्ष्म्यै</text>
                <text x="6" y="112" opacity="0.5">न</text>
                <text x="6" y="124" opacity="0.8">मः</text>
                
                <!-- Coluna 2 -->
                <text x="20" y="18" opacity="0.6">मः</text>
                <text x="20" y="30" opacity="0.8">ॐ</text>
                <text x="20" y="42" opacity="0.4">श्</text>
                <text x="20" y="54" opacity="0.7">री</text>
                <text x="20" y="66" opacity="0.5">ं</text>
                <text x="20" y="78" opacity="0.9">म</text>
                <text x="20" y="90" opacity="0.3">हा</text>
                <text x="20" y="102" opacity="0.6">ला</text>
                <text x="20" y="114" opacity="0.4">क्ष्म्यै</text>
                <text x="20" y="126" opacity="0.7">न</text>
                
                <!-- Coluna 3 -->
                <text x="34" y="12" opacity="0.5">री</text>
                <text x="34" y="24" opacity="0.8">ं</text>
                <text x="34" y="36" opacity="0.6">म</text>
                <text x="34" y="48" opacity="0.4">हा</text>
                <text x="34" y="60" opacity="0.9">ला</text>
                <text x="34" y="72" opacity="0.7">क्ष्म्यै</text>
                <text x="34" y="84" opacity="0.3">न</text>
                <text x="34" y="96" opacity="0.8">मः</text>
                <text x="34" y="108" opacity="0.5">ॐ</text>
                <text x="34" y="120" opacity="0.6">श्</text>
                
                <!-- Coluna 4 -->
                <text x="48" y="16" opacity="0.7">क्ष्म्यै</text>
                <text x="48" y="28" opacity="0.4">न</text>
                <text x="48" y="40" opacity="0.9">मः</text>
                <text x="48" y="52" opacity="0.5">ॐ</text>
                <text x="48" y="64" opacity="0.8">श्</text>
                <text x="48" y="76" opacity="0.6">री</text>
                <text x="48" y="88" opacity="0.4">ं</text>
                <text x="48" y="100" opacity="0.7">म</text>
                <text x="48" y="112" opacity="0.3">हा</text>
                <text x="48" y="124" opacity="0.9">ला</text>
                
                <!-- Coluna 5 -->
                <text x="62" y="10" opacity="0.8">ला</text>
                <text x="62" y="22" opacity="0.6">क्ष्म्यै</text>
                <text x="62" y="34" opacity="0.4">न</text>
                <text x="62" y="46" opacity="0.7">मः</text>
                <text x="62" y="58" opacity="0.9">ॐ</text>
                <text x="62" y="70" opacity="0.5">श्</text>
                <text x="62" y="82" opacity="0.8">री</text>
                <text x="62" y="94" opacity="0.3">ं</text>
                <text x="62" y="106" opacity="0.6">म</text>
                <text x="62" y="118" opacity="0.4">हा</text>
            </g>
            
            <!-- Caracteres mais brilhantes (verde claro) em destaque -->
            <g font-family="'Noto Sans Devanagari', 'Arial', sans-serif" font-size="10" fill="#5afc8a" filter="url(#glow)" opacity="0.5">
                <text x="12" y="32">ॐ</text>
                <text x="40" y="56">श्</text>
                <text x="55" y="88">री</text>
                <text x="26" y="104">ं</text>
            </g>
        </pattern>
    </defs>
    
    <!-- Aba da pasta (parte superior) -->
    <path d="m 21.976562 12 c -5.527343 0 -9.976562 4.460938 -9.976562 10 v 86.03125 c 0 5.542969 4.449219 10 9.976562 10 h 84.042969 c 5.53125 0 9.980469 -4.457031 9.980469 -10 v -72.085938 c 0 -6.628906 -5.359375 -12 -11.972656 -12 h -46.027344 c -2.453125 0 -4.695312 -1.386718 -5.796875 -3.582031 l -1.503906 -2.992187 c -1.65625 -3.292969 -5.019531 -5.371094 -8.699219 -5.371094 z m 0 0" fill="#1a5e2a"/>
    
    <!-- Corpo da pasta com fundo Matrix rain em Sânscrito -->
    <path d="m 65.976562 32 c -2.746093 0 -5.226562 1.101562 -7.027343 2.890625 c -2.273438 2.253906 -5.382813 5.109375 -8.632813 5.109375 h -28.339844 c -5.527343 0 -9.976562 4.460938 -9.976562 10 v 55.976562 c 0 5.539063 4.449219 10 9.976562 10 h 84.042969 c 5.53125 0 9.980469 -4.460937 9.980469 -10 v -63.976562 c 0 -5.539062 -4.449219 -10 -9.980469 -10 z m 0 0" fill="url(#matrixRain)"/>
    
    <!-- Overlay semi-transparente para dar profundidade -->
    <path d="m 65.976562 32 c -2.746093 0 -5.226562 1.101562 -7.027343 2.890625 c -2.273438 2.253906 -5.382813 5.109375 -8.632813 5.109375 h -28.339844 c -5.527343 0 -9.976562 4.460938 -9.976562 10 v 55.976562 c 0 5.539063 4.449219 10 9.976562 10 h 84.042969 c 5.53125 0 9.980469 -4.460937 9.980469 -10 v -63.976562 c 0 -5.539062 -4.449219 -10 -9.980469 -10 z m 0 0" fill="#0a2a1a" opacity="0.3"/>
    
    <!-- Borda da pasta -->
    <path d="m 65.976562 32 c -2.746093 0 -5.226562 1.101562 -7.027343 2.890625 c -2.273438 2.253906 -5.382813 5.109375 -8.632813 5.109375 h -28.339844 c -5.527343 0 -9.976562 4.460938 -9.976562 10 v 55.976562 c 0 5.539063 4.449219 10 9.976562 10 h 84.042969 c 5.53125 0 9.980469 -4.460937 9.980469 -10 v -63.976562 c 0 -5.539062 -4.449219 -10 -9.980469 -10 z m 0 0" fill="none" stroke="#2a8e4a" stroke-width="1.2" opacity="0.6"/>
    
    <!-- ========== CAIXA/MALETA COM FERRAMENTAS ========== -->
    <!-- Maleta -->
    <rect x="24" y="52" width="34" height="28" rx="3" ry="3" fill="#1a3a5e" stroke="#2a5ea8" stroke-width="1.5" opacity="0.92"/>
    <!-- Alça da maleta -->
    <path d="m 32 52 v -3.5 c 0 -3 2.5 -5.5 7 -5.5 s 7 2.5 7 5.5 v 3.5" fill="none" stroke="#2a5ea8" stroke-width="2" stroke-linecap="round" opacity="0.92"/>
    <!-- Fechos da maleta -->
    <rect x="28" y="55" width="4" height="3" rx="1" fill="#d4a32e" opacity="0.9"/>
    <rect x="50" y="55" width="4" height="3" rx="1" fill="#d4a32e" opacity="0.9"/>
    
    <!-- Esquadro (triângulo) -->
    <polygon points="30,73 30,60 43,73" fill="#f5c542" stroke="#d4a32e" stroke-width="1.2"/>
    <path d="m 30 71 l 2 0 l 0 -2" fill="none" stroke="#b8891a" stroke-width="0.8"/>
    
    <!-- Compasso -->
    <line x1="50" y1="58" x2="42" y2="75" stroke="#b0b0b0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="50" y1="58" x2="56" y2="75" stroke="#b0b0b0" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="50" cy="58" r="2.2" fill="#888888"/>
    <circle cx="42" cy="75" r="1" fill="#666"/>
    <circle cx="56" cy="75" r="1" fill="#666"/>
    
    <!-- Parafuso central da maleta -->
    <circle cx="41" cy="66" r="1.5" fill="#888" opacity="0.7"/>
    
    <!-- ========== ROBÔ/AUTÔMATO ========== -->
    <!-- Corpo do robô -->
    <rect x="70" y="54" width="24" height="12" rx="3" ry="3" fill="#3a7bc8" stroke="#2a5ea8" stroke-width="1.2" opacity="0.92"/>
    
    <!-- Detalhes do corpo -->
    <rect x="74" y="57" width="5" height="6" rx="1" fill="#2a5ea8" opacity="0.7"/>
    <rect x="85" y="57" width="5" height="6" rx="1" fill="#2a5ea8" opacity="0.7"/>
    
    <!-- Cabeça do robô -->
    <rect x="72" y="42" width="20" height="14" rx="4" ry="4" fill="#5a9ad8" stroke="#3a7bc8" stroke-width="1.2"/>
    
    <!-- Olhos -->
    <circle cx="79" cy="49" r="3" fill="#1a3a5e"/>
    <circle cx="85" cy="49" r="3" fill="#1a3a5e"/>
    <circle cx="80" cy="48" r="1.2" fill="#5afc8a"/>
    <circle cx="86" cy="48" r="1.2" fill="#5afc8a"/>
    
    <!-- Antena -->
    <line x1="82" y1="42" x2="82" y2="35" stroke="#3a7bc8" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="82" cy="33" r="2.5" fill="#f5c542"/>
    
    <!-- Boca (grade) -->
    <rect x="75" y="52" width="14" height="3" rx="1" fill="#1a3a5e"/>
    <line x1="78" y1="52" x2="78" y2="55" stroke="#5a9ad8" stroke-width="0.8"/>
    <line x1="81" y1="52" x2="81" y2="55" stroke="#5a9ad8" stroke-width="0.8"/>
    <line x1="84" y1="52" x2="84" y2="55" stroke="#5a9ad8" stroke-width="0.8"/>
    <line x1="87" y1="52" x2="87" y2="55" stroke="#5a9ad8" stroke-width="0.8"/>
    
    <!-- Braços -->
    <rect x="66" y="56" width="4" height="8" rx="2" fill="#5a9ad8" stroke="#3a7bc8" stroke-width="0.8"/>
    <rect x="94" y="56" width="4" height="8" rx="2" fill="#5a9ad8" stroke="#3a7bc8" stroke-width="0.8"/>
    
    <!-- Pés -->
    <rect x="73" y="66" width="7" height="4" rx="1.5" fill="#3a7bc8"/>
    <rect x="84" y="66" width="7" height="4" rx="1.5" fill="#3a7bc8"/>
    
    <!-- Conexão robô ↔ maleta (linha de dados/circuito) -->
    <path d="m 58 66 l 6 0 l 2 -4 l 4 0" fill="none" stroke="#5afc8a" stroke-width="1" opacity="0.6" stroke-dasharray="2,1"/>
    
    <!-- Detalhe de circuito na maleta -->
    <circle cx="58" cy="66" r="1.5" fill="#5afc8a" opacity="0.5"/>
</svg>