        <text x="46" y="38" opacity="0.10">ा</text>
        <text x="46" y="46" opacity="0.20">घ</text>
        <text x="46" y="54" opacity="0.40">द्</text>
        <text x="46" y="62" opacity="0.65">उ</text>
        <text x="46" y="70" opacity="0.85">उद्</text>
        <text x="46" y="78" opacity="0.95">उद्घा</text>
        <text x="46" y="86" opacity="0.85">उद्घाट</text>
        <text x="46" y="94" opacity="0.60">घाट</text>
        <text x="46" y="102" opacity="0.35">ज्ञ</text>
