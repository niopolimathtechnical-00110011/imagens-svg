        <text x="16" y="28" opacity="0.03">म्</text>
        <text x="16" y="36" opacity="0.08">ह</text>
        <text x="16" y="44" opacity="0.18">ऽ</text>
        <text x="16" y="52" opacity="0.35">स्</text>
        <text x="16" y="60" opacity="0.60">सोऽ</text>
        <text x="16" y="68" opacity="0.85">सोऽह</text>
        <text x="16" y="76" opacity="0.95">सोऽहम्</text>
        <text x="16" y="84" opacity="0.80">हम्</text>
        <text x="16" y="92" opacity="0.55">म्</text>
        <text x="16" y="100" opacity="0.30">ज्ञ</text>
        <text x="16" y="108" opacity="0.12">त</text>
        <text x="16" y="116" opacity="0.04">कृ</text>
    </g>
    
    <!-- COLUNA 3: ॐ शान्तिः शान्तिः शान्तिः -->
    <g font-family="'Noto Sans Devanagari', 'Arial', 'Segoe UI', sans-serif" font-size="6" fill="#00ff41" filter="url(#neonGlow)">
