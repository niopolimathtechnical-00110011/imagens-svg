<svg height="128px" viewBox="0 0 128 128" width="128px" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Filtro de brilho neon para os caracteres -->
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="0.7" result="blur1"/>
            <feGaussianBlur stdDeviation="1.3" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- Filtro mais intenso para caracteres brilhantes -->
        <filter id="neonBright" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1" result="blur1"/>
            <feGaussianBlur stdDeviation="2.2" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- Gradiente da aba da pasta -->
        <linearGradient id="a" gradientTransform="matrix(0.45451 0 0 0.455522 -1210.292114 616.172607)" gradientUnits="userSpaceOnUse" x1="2689.251953" x2="2918.069824" y1="-1106.802979" y2="-1106.802979">
            <stop offset="0" stop-color="#2a2a2a"/>
            <stop offset="0.0576991" stop-color="#4a4a4a"/>
            <stop offset="0.122204" stop-color="#2a2a2a"/>
            <stop offset="0.873306" stop-color="#2a2a2a"/>
            <stop offset="0.955997" stop-color="#3a3a3a"/>
            <stop offset="1" stop-color="#2a2a2a"/>
        </linearGradient>
    </defs>
    
    <!-- ========== FUNDO PRETO DA PASTA ========== -->
    <!-- Aba da pasta (parte superior) -->
    <path d="m 21.976562 12 c -5.527343 0 -9.976562 4.460938 -9.976562 10 v 86.03125 c 0 5.542969 4.449219 10 9.976562 10 h 84.042969 c 5.53125 0 9.980469 -4.457031 9.980469 -10 v -72.085938 c 0 -6.628906 -5.359375 -12 -11.972656 -12 h -46.027344 c -2.453125 0 -4.695312 -1.386718 -5.796875 -3.582031 l -1.503906 -2.992187 c -1.65625 -3.292969 -5.019531 -5.371094 -8.699219 -5.371094 z m 0 0" fill="#1a1a1a" stroke="#333333" stroke-width="0.8"/>
    
    <!-- Corpo da pasta (fundo preto principal) -->
    <path d="m 65.976562 32 c -2.746093 0 -5.226562 1.101562 -7.027343 2.890625 c -2.273438 2.253906 -5.382813 5.109375 -8.632813 5.109375 h -28.339844 c -5.527343 0 -9.976562 4.460938 -9.976562 10 v 55.976562 c 0 5.539063 4.449219 10 9.976562 10 h 84.042969 c 5.53125 0 9.980469 -4.460937 9.980469 -10 v -63.976562 c 0 -5.539062 -4.449219 -10 -9.980469 -10 z m 0 0" fill="#0a0a0a"/>
    
    <!-- ========== CHUVA DE MANTRA EM SÂNSCRITO (LEITURA VERTICAL CAINDO) ========== -->
