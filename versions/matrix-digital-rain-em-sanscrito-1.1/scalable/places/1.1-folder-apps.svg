    <!-- COLUNA 8: समृद्धि + कृतज्ञ -->
    <g font-family="'Noto Sans Devanagari', 'Arial', 'Segoe UI', sans-serif" font-size="5.8" fill="#00ff41" filter="url(#neonGlow)">
        <text x="76" y="32" opacity="0.06">ि</text>
        <text x="76" y="40" opacity="0.14">द्</text>
        <text x="76" y="48" opacity="0.28">ध</text>
        <text x="76" y="56" opacity="0.48">ृ</text>
        <text x="76" y="64" opacity="0.68">म</text>
        <text x="76" y="72" opacity="0.88">स</text>
        <text x="76" y="80" opacity="0.95">समृ</text>
        <text x="76" y="88" opacity="0.82">समृद्</text>
        <text x="76" y="96" opacity="0.58">समृद्ध</text>
        <text x="76" y="104" opacity="0.32">समृद्धि</text>
        <text x="76" y="112" opacity="0.12">ज्ञ</text>
        <text x="76" y="120" opacity="0.04">त</text>
