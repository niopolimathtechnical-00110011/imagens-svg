        <text x="26" y="48" opacity="0.30">िः</text>
        <text x="26" y="56" opacity="0.50">शान्</text>
        <text x="26" y="64" opacity="0.75">शान्तिः</text>
        <text x="26" y="72" opacity="0.95">शान्तिः</text>
        <text x="26" y="80" opacity="0.90">शान्तिः</text>
        <text x="26" y="88" opacity="0.70">न्तिः</text>
