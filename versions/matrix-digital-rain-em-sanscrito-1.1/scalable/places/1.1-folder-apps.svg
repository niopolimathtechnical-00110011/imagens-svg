        <text x="106" y="34" opacity="0.05">क्ष्म्यै</text>
        <text x="106" y="42" opacity="0.12">ला</text>
        <text x="106" y="50" opacity="0.25">हा</text>
        <text x="106" y="58" opacity="0.45">म</text>
        <text x="106" y="66" opacity="0.70">ं</text>
        <text x="106" y="74" opacity="0.88">री</text>
        <text x="106" y="82" opacity="0.92">श्</text>
        <text x="106" y="90" opacity="0.75">श्रीं</text>
        <text x="106" y="98" opacity="0.50">ॐ</text>
        <text x="106" y="106" opacity="0.28">न</text>
        <text x="106" y="114" opacity="0.10">मः</text>
    </g>
    
    <!-- ========== CARACTERES SUPER BRILHANTES (DESTAQUE) ========== -->
