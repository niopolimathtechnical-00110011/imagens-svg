         1. ॐ श्रीं महालक्ष्म्यै नमः (Om Shreem Mahalakshmiyei Namaha)
         2. सोऽहम् (So'ham)
         3. ॐ शान्तिः शान्तिः शान्तिः (Om Shanti Shanti Shanti)
         4. कृतज्ञ (Kritajna - Gratidão)
         5. उद्घाट (Ughata - Abra-te)
         6. समृद्धि (Samriddhi - Prosperidade)
    -->
    
    <!-- COLUNA 1: ॐ श्रीं महालक्ष्म्यै नमः (completo, caindo) -->
    <g font-family="'Noto Sans Devanagari', 'Arial', 'Segoe UI', sans-serif" font-size="6" fill="#00ff41" filter="url(#neonGlow)">
        <text x="6" y="30" opacity="0.05">मः</text>
        <text x="6" y="38" opacity="0.12">न</text>
        <text x="6" y="46" opacity="0.25">क्ष्म्यै</text>
        <text x="6" y="54" opacity="0.45">ला</text>
        <text x="6" y="62" opacity="0.65">हा</text>
        <text x="6" y="70" opacity="0.85">म</text>
        <text x="6" y="78" opacity="0.95">ं</text>
        <text x="6" y="86" opacity="0.85">री</text>
        <text x="6" y="94" opacity="0.65">श्</text>
        <text x="6" y="102" opacity="0.40">श्रीं</text>
        <text x="6" y="110" opacity="0.20">ॐ</text>
        <text x="6" y="118" opacity="0.08">ॐ</text>
    </g>
    
    <!-- COLUNA 2: सोऽहम् + कृतज्ञ alternados -->
