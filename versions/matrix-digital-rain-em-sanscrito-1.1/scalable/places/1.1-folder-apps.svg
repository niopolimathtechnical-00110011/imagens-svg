        <text x="96" y="44" opacity="0.16">ह</text>
        <text x="96" y="52" opacity="0.32">ऽ</text>
        <text x="96" y="60" opacity="0.55">स्</text>
        <text x="96" y="68" opacity="0.78">सोऽ</text>
        <text x="96" y="76" opacity="0.92">सोऽह</text>
