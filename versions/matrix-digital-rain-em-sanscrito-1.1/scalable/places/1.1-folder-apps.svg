        <text x="36" y="34" opacity="0.06">द्</text>
        <text x="36" y="42" opacity="0.12">ध</text>
        <text x="36" y="50" opacity="0.25">ृ</text>
        <text x="36" y="58" opacity="0.45">म</text>
        <text x="36" y="66" opacity="0.70">स</text>
        <text x="36" y="74" opacity="0.90">समृ</text>
        <text x="36" y="82" opacity="0.95">समृद्</text>
        <text x="36" y="90" opacity="0.80">समृद्ध</text>
        <text x="36" y="98" opacity="0.55">समृद्धि</text>
