    <!-- COLUNA 9: ॐ शान्तिः शान्तिः शान्तिः -->
    <g font-family="'Noto Sans Devanagari', 'Arial', 'Segoe UI', sans-serif" font-size="6" fill="#00ff41" filter="url(#neonGlow)">
        <text x="86" y="30" opacity="0.04">ः</text>
        <text x="86" y="38" opacity="0.10">त</text>
        <text x="86" y="46" opacity="0.22">िः</text>
        <text x="86" y="54" opacity="0.42">शान्</text>
        <text x="86" y="62" opacity="0.65">शान्तिः</text>
        <text x="86" y="70" opacity="0.88">शान्तिः</text>
        <text x="86" y="78" opacity="0.92">शान्तिः</text>
        <text x="86" y="86" opacity="0.75">न्तिः</text>
        <text x="86" y="94" opacity="0.50">शा</text>
        <text x="86" y="102" opacity="0.28">ॐ</text>
        <text x="86" y="110" opacity="0.12">ॐ</text>
    </g>
    
    <!-- COLUNA 10: सोऽहम् + उद्घाट -->
    <g font-family="'Noto Sans Devanagari', 'Arial', 'Segoe UI', sans-serif" font-size="5.5" fill="#00ff41" filter="url(#neonGlow)">
